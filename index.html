<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บัตรอนุโมทนา — ตักบาตรหมื่นรูปโคราช (ทดสอบ)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --paper: #F3E9D2;
    --card: #FFFDF8;
    --ink: #3B2A1E;
    --ink-soft: #7A6A57;
    --saffron: #D9711F;
    --gold: #B8860B;
    --success: #35603F;
    --success-bg: #E3EEE2;
    --pending: #A56A2E;
    --pending-bg: #F4E9D8;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 10%, rgba(184,134,11,0.08), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(217,113,31,0.07), transparent 45%),
      var(--paper);
    font-family:'Sarabun', sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding:32px 16px 60px;
  }

  .page-head{
    max-width:720px;
    margin:0 auto 24px;
    text-align:center;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    letter-spacing:2px;
    color:var(--gold);
    font-weight:600;
    margin-bottom:10px;
  }
  .eyebrow::before, .eyebrow::after{
    content:'';
    width:24px;
    height:1px;
    background:var(--gold);
  }

  .page-title{
    font-family:'Chonburi', cursive;
    font-size:30px;
    color:var(--ink);
    margin:0;
  }

  /* --- แผงทดสอบ (ลบออกได้เมื่อใช้งานจริงผ่าน LIFF) --- */
  .test-panel{
    max-width:520px;
    margin:20px auto 32px;
    background:#FFFDF8;
    border:1px dashed var(--gold);
    border-radius:14px;
    padding:16px 18px;
  }
  .test-panel label{
    display:block;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .test-row{
    display:flex;
    gap:8px;
  }
  .test-row input{
    flex:1;
    padding:10px 12px;
    border:1px solid #E0CFA0;
    border-radius:10px;
    font-family:'Sarabun', sans-serif;
    font-size:14px;
  }
  .test-row button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:var(--saffron);
    color:#fff;
    font-family:'Sarabun', sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
  }
  .test-row button:hover{ background:#B85A16; }
  .test-hint{
    margin-top:8px;
    font-size:12px;
    color:var(--ink-soft);
  }

  .grid{
    max-width:960px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:22px;
  }

  .ticket{
    position:relative;
    background:var(--card);
    border-radius:18px;
    box-shadow:
      0 1px 0 rgba(184,134,11,0.4) inset,
      0 14px 28px rgba(59,42,30,0.10);
    border:1px solid #EADFC4;
    overflow:hidden;
    animation:rise .5s ease backwards;
  }
  .ticket:nth-child(1){ animation-delay:.02s; }
  .ticket:nth-child(2){ animation-delay:.08s; }
  .ticket:nth-child(3){ animation-delay:.14s; }
  .ticket:nth-child(4){ animation-delay:.20s; }
  .ticket:nth-child(5){ animation-delay:.26s; }

  @keyframes rise{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .ticket-top{
    padding:22px 22px 18px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }

  .donor-name{
    font-size:19px;
    font-weight:700;
    line-height:1.4;
    color:var(--ink);
  }

  .donor-label{
    font-size:12px;
    color:var(--ink-soft);
    letter-spacing:0.5px;
    margin-bottom:4px;
  }

  .seal{
    flex:0 0 auto;
    width:52px;
    height:52px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    border:2px solid;
  }
  .seal.received{
    border-color:var(--success);
    color:var(--success);
    background:var(--success-bg);
  }
  .seal.waiting{
    border-color:var(--pending);
    color:var(--pending);
    background:var(--pending-bg);
  }

  .perforation{
    position:relative;
    height:0;
    border-top:2px dashed #E3D3A8;
    margin:0 8px;
  }
  .perforation::before, .perforation::after{
    content:'';
    position:absolute;
    top:-9px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:var(--paper);
    box-shadow:0 0 0 1px #EADFC4;
  }
  .perforation::before{ left:-9px; }
  .perforation::after{ right:-9px; }

  .ticket-bottom{
    padding:18px 22px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .seat-label{
    font-size:12px;
    color:var(--ink-soft);
    letter-spacing:0.5px;
    margin-bottom:2px;
  }

  .seat-number{
    font-family:'Chonburi', cursive;
    font-size:42px;
    line-height:1;
    color:var(--seat-color, var(--saffron));
  }

  .status-tag{
    font-size:13px;
    font-weight:600;
    padding:6px 12px;
    border-radius:999px;
  }
  .status-tag.received{ background:var(--success-bg); color:var(--success); }
  .status-tag.waiting{ background:var(--pending-bg); color:var(--pending); }

  .empty, .loading, .error{
    max-width:520px;
    margin:60px auto;
    text-align:center;
    color:var(--ink-soft);
    font-size:15px;
  }
  .empty .big, .error .big{
    font-size:38px;
    display:block;
    margin-bottom:12px;
  }

  .error{ color:#8a3b1a; }

  @media (max-width:420px){
    .grid{ grid-template-columns:1fr; }
    .page-title{ font-size:24px; }
    .test-row{ flex-direction:column; }
  }
</style>
</head>
<body>

<div id="app">

  <div class="page-head">
    <div class="eyebrow">อนุโมทนาบุญ</div>
    <h1 class="page-title">ตักบาตรหมื่นรูปโคราช</h1>
  </div>

  <!-- แผงทดสอบ: ใส่ userId เอง (หรือเว้นว่างถ้า GAS เวอร์ชันยังไม่กรอง) -->
  <div class="test-panel">
    <label>userId (เว้นว่างได้ถ้า GAS ยังไม่กรอง)</label>
    <div class="test-row">
      <input v-model="userIdInput" placeholder="เช่น Uxxxxxxxxxxxxxxxx" @keyup.enter="loadData">
      <button @click="loadData">โหลดข้อมูล</button>
    </div>
    <div class="test-hint">GAS_URL: {{ GAS_URL }}</div>
  </div>

  <div v-if="loading" class="loading">กำลังโหลดข้อมูล...</div>

  <div v-else-if="errorMsg" class="error">
    <span class="big">⚠️</span>
    {{ errorMsg }}
  </div>

  <div v-else-if="rows.length === 0" class="empty">
    <span class="big">🪷</span>
    ไม่พบบัตรอนุโมทนา
  </div>

  <div v-else class="grid">
    <div class="ticket" v-for="(r, i) in rows" :key="i">

      <div class="ticket-top">
        <div>
          <div class="donor-label">เจ้าภาพ</div>
          <div class="donor-name">{{ r.donorName }}</div>
        </div>
        <div class="seal" :class="r.receivedBow ? 'received' : 'waiting'">
          {{ r.receivedBow ? '🎗️' : '⏳' }}
        </div>
      </div>

      <div class="perforation"></div>

      <div class="ticket-bottom">
        <div>
          <div class="seat-label">หมายเลขกล่อง</div>
          <div class="seat-number" :style="{ '--seat-color': seatColor(r.assigned) }">
            {{ r.assigned }}
          </div>
        </div>
        <div class="status-tag" :class="r.receivedBow ? 'received' : 'waiting'">
          {{ r.receivedBow ? 'รับโบว์แล้ว' : 'ยังไม่รับโบว์' }}
        </div>
      </div>

    </div>
  </div>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp, ref, onMounted } = Vue;

createApp({
  setup(){

    // ⚠️ เปลี่ยนเป็น URL ของ Google Apps Script web app ที่ deploy ไว้
    const GAS_URL = "https://script.google.com/macros/s/AKfycbycILsIv2PLjo9j2CDBfLjelkvGaqee3r316x_9uyFG8h27Xu1cVOPnurACSWfb2y76gQ/exec";

    const rows = ref([]);
    const loading = ref(false);
    const errorMsg = ref('');
    const userIdInput = ref('');

    function seatColor(assigned){
      const s = String(assigned || '');
      if(s.startsWith('V')) return '#8B5CF6';
      if(s.startsWith('L')) return '#EC4899';
      if(s.startsWith('M')) return '#F97316';
      if(s.startsWith('S')) return '#3B82F6';
      return '#D9711F';
    }

    async function loadData(){
      loading.value = true;
      errorMsg.value = '';
      rows.value = [];

      try{
        const url = userIdInput.value
          ? `${GAS_URL}?userId=${encodeURIComponent(userIdInput.value)}`
          : GAS_URL;

        const res = await fetch(url);

        if(!res.ok){
          throw new Error('HTTP ' + res.status);
        }

        const data = await res.json();

        if(data.error){
          errorMsg.value = data.error;
        } else {
          rows.value = data.rows || [];
        }

      } catch(err){
        errorMsg.value = 'ดึงข้อมูลไม่สำเร็จ: ' + err.message;
      } finally {
        loading.value = false;
      }
    }

    onMounted(() => {
      loadData(); // โหลดครั้งแรกทันที (ไม่ใส่ userId ถ้ายังไม่พิมพ์อะไร)
    });

    return { rows, loading, errorMsg, userIdInput, loadData, seatColor, GAS_URL };
  }
}).mount('#app');
</script>

</body>
</html>
