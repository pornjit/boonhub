<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บัตรอนุโมทนา — ตักบาตรหมื่นรูปโคราช</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Prompt',sans-serif;
}

body{
  min-height:100vh;
  padding:20px;
  background:linear-gradient(135deg,#f8fafc,#eef2ff);
}

.container{
  max-width:850px;
  margin:auto;
}

.group-card{
  background:#fff;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.header{
  padding:32px 28px;
  color:#fff;
  background:
  linear-gradient(
    135deg,
    #06c755 0%,
    #22c55e 30%,
    #14b8a6 65%,
    #0ea5e9 100%
  );
}

.header h1{
  font-size:30px;
  font-weight:700;
  margin-bottom:6px;
}

.header p{
  opacity:.95;
  font-size:14px;
}

.member{
  padding:18px 24px;
  border-bottom:1px solid #f1f5f9;
  transition:.2s;
}

.member:hover{
  background:#fafafa;
}

.name-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.name{
  font-size:17px;
  font-weight:600;
  color:#0f172a;
}

.seat{
  padding:8px 18px;
  border-radius:999px;
  font-size:16px;
  font-weight:700;
  color:#fff;
  min-width:85px;
  text-align:center;
  box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.v{
  background:#ec4899;
}

.l{
  background:#8b5cf6;
}

.m{
  background:#f97316;
}

.s{
  background:#22c55e;
}

.default-seat{
  background:#D9711F;
}

.lineid{
  margin-top:4px;
  color:#64748b;
  font-size:13px;
}

.badges{
  margin-top:8px;
}

.badge{
  display:inline-flex;
  align-items:center;
  padding:5px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

.received{
  background:#dcfce7;
  color:#15803d;
}

.pending{
  background:#fef3c7;
  color:#b45309;
}

.state-msg{
  max-width:520px;
  margin:60px auto;
  text-align:center;
  color:#64748b;
  font-size:15px;
}
.state-msg .big{
  font-size:38px;
  display:block;
  margin-bottom:12px;
}
.state-msg.error-msg{
  color:#8a3b1a;
}

@media(max-width:640px){

  .member{
    padding:16px;
  }

  .name{
    font-size:16px;
  }

  .seat{
    font-size:15px;
    min-width:75px;
    padding:7px 14px;
  }

}
</style>
</head>

<body>

<div id="app">
  <div class="container">
    <div class="group-card">

      <div class="header">
        <h1>🙏 ตักบาตรหมื่นรูปโคราช</h1>
        <p>{{ greeting }}</p>
      </div>

      <div v-if="loading" class="state-msg">กำลังโหลดข้อมูล...</div>

      <div v-else-if="errorMsg" class="state-msg error-msg">
        <span class="big">⚠️</span>
        {{ errorMsg }}
      </div>

      <div v-else-if="rows.length === 0" class="state-msg">
        <span class="big">🪷</span>
        ไม่พบบัตรอนุโมทนาของคุณ
      </div>

      <div v-else v-for="(r, i) in rows" :key="i" class="member">
        <div class="name-row">
          <div class="name">{{ r.donorName }}</div>
          <div class="seat" :class="seatClass(r.assigned)">{{ r.assigned }}</div>
        </div>

        <div class="badges">
          <span class="badge" :class="r.receivedBow ? 'received' : 'pending'">
            {{ r.receivedBow ? '✅ รับโบว์แล้ว' : '⏳ ยังไม่รับโบว์' }}
          </span>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const { createApp, ref, onMounted } = Vue;

// ⚠️ เปลี่ยนเป็น URL ของ Google Apps Script web app ที่ deploy ไว้
// (endpoint ต้องรับ ?userId=xxx แล้วตอบ JSON: { rows: [{donorName, assigned, receivedBow}] })
const GAS_URL = "https://script.google.com/macros/s/AKfycbwwOYnFTNw-O-lgUhHVpxK0ymyIfgtszsZ4P66pG9CMvfSukAVq86ZCY3bQElC5A1qz9A/exec";

// ⚠️ เปลี่ยนเป็น LIFF ID ของคุณ
const LIFF_ID = "2010679767-wyChm2c3";

createApp({
  setup(){
    const rows = ref([]);
    const greeting = ref('👋 กำลังโหลดข้อมูล...');
    const loading = ref(true);
    const errorMsg = ref('');

    function seatClass(assigned){
      const s = String(assigned || '');
      if(s.startsWith('V')) return 'v';
      if(s.startsWith('L')) return 'l';
      if(s.startsWith('M')) return 'm';
      if(s.startsWith('S')) return 's';
      return 'default-seat';
    }

    async function loadData(userId){
      try{
        const res = await fetch(`${GAS_URL}?userId=${encodeURIComponent(userId)}&t=${Date.now()}`, {
  cache: 'no-store'
});

        if(!res.ok){
          throw new Error('HTTP ' + res.status);
        }

        const data = await res.json();

        if(data.error){
          errorMsg.value = data.error;
        } else {
          rows.value = data.rows || [];
        }

      } catch(err){
        errorMsg.value = 'ดึงข้อมูลไม่สำเร็จ: ' + err.message;
      } finally {
        loading.value = false;
      }
    }

    onMounted(async () => {
      try{
        await liff.init({ liffId: LIFF_ID });

        if(!liff.isLoggedIn()){
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
       greeting.value = '👋 สวัสดีค่ะ คุณ' + profile.displayName ;

        //greeting.value = '👋 สวัสดีค่ะ ' + profile.displayName + ' | userId: ' + profile.userId;

        // ส่ง userId ของคนที่กำลังเปิดอยู่ ไปกรองข้อมูลที่ GAS โดยตรง
        await loadData(profile.userId);

      } catch(err){
        loading.value = false;
        errorMsg.value = 'เกิดข้อผิดพลาด: ' + err.message;
      }
    });

    return { rows, greeting, loading, errorMsg, seatClass };
  }
}).mount('#app');
</script>

</body>
</html>
