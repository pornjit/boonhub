<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หมายเลขกล่องตักบาตร</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Prompt',sans-serif;
}

body{
  min-height:100vh;
  padding:20px;
  background:linear-gradient(135deg,#f8fafc,#eef2ff);
}

.container{
  max-width:850px;
  margin:auto;
}

.group-card{
  background:#fff;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.header{
  padding:32px 28px;
  color:#fff;
  background:
  linear-gradient(
    135deg,
    #06c755 0%,
    #22c55e 30%,
    #14b8a6 65%,
    #0ea5e9 100%
  );
}

.header h1{
  font-size:30px;
  font-weight:700;
  margin-bottom:6px;
}

.header p{
  opacity:.95;
  font-size:14px;
}

.member{
  padding:18px 24px;
  border-bottom:1px solid #f1f5f9;
  transition:.2s;
  cursor:pointer;
}

.member:hover{
  background:#fafafa;
}

.member:active{
  background:#f1f5f9;
}

.name-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.name{
  font-size:17px;
  font-weight:600;
  color:#0f172a;
}

.seat{
  padding:8px 18px;
  border-radius:999px;
  font-size:16px;
  font-weight:700;
  color:#fff;
  min-width:85px;
  text-align:center;
  box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.v{
  background:#ec4899;
}

.l{
  background:#8b5cf6;
}

.m{
  background:#f97316;
}

.s{
  background:#22c55e;
}

.default-seat{
  background:#D9711F;
}

.lineid{
  margin-top:4px;
  color:#64748b;
  font-size:13px;
}

.badges{
  margin-top:8px;
}

.badge{
  display:inline-flex;
  align-items:center;
  padding:5px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

.received{
  background:#dcfce7;
  color:#15803d;
}

.pending{
  background:#fef3c7;
  color:#b45309;
}

.tap-hint{
  margin-top:6px;
  font-size:11px;
  color:#94a3b8;
}

.state-msg{
  max-width:520px;
  margin:60px auto;
  text-align:center;
  color:#64748b;
  font-size:15px;
}
.state-msg .big{
  font-size:38px;
  display:block;
  margin-bottom:12px;
}
.state-msg.error-msg{
  color:#8a3b1a;
}

/* ---------- Modal ---------- */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:1000;
}

.modal{
  background:#fff;
  border-radius:24px;
  max-width:420px;
  width:100%;
  max-height:92vh;
  overflow-y:auto;
  padding:18px;
  position:relative;
}

.modal-close{
  position:absolute;
  top:12px;
  right:12px;
  width:34px;
  height:34px;
  border-radius:50%;
  background:#f1f5f9;
  border:none;
  font-size:18px;
  color:#334155;
  cursor:pointer;
  z-index:2;
}

.ticket-preview{
  width:100%;
  border-radius:16px;
  display:block;
  background:#eee;
  min-height:200px;
}

.ticket-loading{
  text-align:center;
  padding:60px 0;
  color:#64748b;
  font-size:14px;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.btn{
  flex:1;
  border:none;
  border-radius:14px;
  padding:13px 10px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.btn-download{
  background:#0f172a;
  color:#fff;
}

.btn:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.share-note{
  margin-top:10px;
  font-size:12px;
  color:#94a3b8;
  text-align:center;
}

@media(max-width:640px){

  .member{
    padding:16px;
  }

  .name{
    font-size:16px;
  }

  .seat{
    font-size:15px;
    min-width:75px;
    padding:7px 14px;
  }

}
</style>
</head>

<body>

<div id="app">
  <div class="container">
    <div class="group-card">

      <div class="header">
        <h3>🙏 ตักบาตรหมื่นรูปโคราช</h3>
        <p>{{ greeting }}</p>
      </div>

      <div v-if="loading" class="state-msg">กำลังโหลดข้อมูล...</div>

      <div v-else-if="errorMsg" class="state-msg error-msg">
        <span class="big">⚠️</span>
        {{ errorMsg }}
      </div>

      <div v-else-if="rows.length === 0" class="state-msg">
        <span class="big">🪷</span>
        ไม่พบบัตรอนุโมทนาของคุณ
      </div>

      <div v-else v-for="(r, i) in rows" :key="i" class="member" @click="openTicket(r)">
        <div class="name-row">
          <div class="name">{{ r.donorName }}</div>
          <div class="seat" :class="seatClass(r.assigned)">{{ r.assigned }}</div>
        </div>

        <div class="badges">
          <span class="badge" :class="r.receivedBow ? 'received' : 'pending'">
            {{ r.receivedBow ? '✅ รับโบว์แล้ว' : '⏳ ยังไม่รับโบว์' }}
          </span>
        </div>

        <div class="tap-hint">แตะเพื่อดูบัตรและดาวน์โหลด</div>
      </div>

    </div>
  </div>

  <!-- Ticket modal -->
  <div v-if="ticketOpen" class="overlay" @click.self="closeTicket">
    <div class="modal">
      <button class="modal-close" @click="closeTicket">✕</button>

      <div v-if="ticketRendering" class="ticket-loading">
        กำลังสร้างบัตร...
      </div>

      <img v-show="!ticketRendering" :src="ticketDataUrl" class="ticket-preview" alt="บัตรตักบาตร">

      <canvas ref="ticketCanvas" style="display:none"></canvas>

      <div class="modal-actions" v-if="!ticketRendering">
        <button class="btn btn-download" @click="downloadTicket">⬇️ ดาวน์โหลด</button>
      </div>

      <div class="share-note" v-if="!ticketRendering">
        ดาวน์โหลดรูปแล้วนำไปแชร์ต่อใน LINE หรือแอปอื่นๆ ได้เลย
      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const { createApp, ref, onMounted, nextTick } = Vue;

// ⚠️ เปลี่ยนเป็น URL ของ Google Apps Script web app ที่ deploy ไว้
// (endpoint ต้องรับ ?userId=xxx แล้วตอบ JSON: { rows: [{donorName, assigned, receivedBow}] })
const GAS_URL = "https://script.google.com/macros/s/AKfycbwwOYnFTNw-O-lgUhHVpxK0ymyIfgtszsZ4P66pG9CMvfSukAVq86ZCY3bQElC5A1qz9A/exec";

// ⚠️ เปลี่ยนเป็น LIFF ID ของคุณ
const LIFF_ID = "2010679767-wyChm2c3";

// รูปต้นแบบบัตร (Cloudinary)
const TICKET_TEMPLATE_URL = "https://res.cloudinary.com/dl0qjw9c9/image/upload/v1784353313/ChatGPT_Image_14_%E0%B8%81.%E0%B8%84._2569_21_36_07_a1qssn.png";

createApp({
  setup(){
    const rows = ref([]);
    const greeting = ref('👋 กำลังโหลดข้อมูล...');
    const loading = ref(true);
    const errorMsg = ref('');

    const ticketOpen = ref(false);
    const ticketRendering = ref(false);
    const ticketDataUrl = ref('');
    const ticketCanvas = ref(null);
    const ticketBlob = ref(null);
    const currentRow = ref(null);

    function seatClass(assigned){
      const s = String(assigned || '');
      if(s.startsWith('V')) return 'v';
      if(s.startsWith('L')) return 'l';
      if(s.startsWith('M')) return 'm';
      if(s.startsWith('S')) return 's';
      return 'default-seat';
    }

    // วาดข้อความให้พอดีกรอบ โดยลดขนาดฟอนต์อัตโนมัติถ้ายาวเกิน
    function fitText(ctx, text, maxWidth, baseSize, minSize, fontWeight, fontFamily){
      let size = baseSize;
      ctx.font = `${fontWeight} ${size}px ${fontFamily}`;
      while(ctx.measureText(text).width > maxWidth && size > minSize){
        size -= 2;
        ctx.font = `${fontWeight} ${size}px ${fontFamily}`;
      }
      return size;
    }

    async function renderTicket(row){
      ticketRendering.value = true;
      ticketDataUrl.value = '';
      ticketBlob.value = null;

      await nextTick();

      const canvas = ticketCanvas.value;
      const ctx = canvas.getContext('2d');

      const img = new Image();
      img.crossOrigin = 'anonymous';

      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = () => reject(new Error('โหลดรูปต้นแบบไม่สำเร็จ'));
        img.src = TICKET_TEMPLATE_URL;
      });

      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // สเกลตำแหน่งตามขนาดจริงของรูป (ต้นแบบอ้างอิงที่ 1024x1536)
      const sx = canvas.width / 1024;
      const sy = canvas.height / 1536;

      const donorName = row.donorName || '';
      const seatNo = row.assigned || '';

      // ---- ชื่อผู้เข้าร่วม ----
      const nameMaxWidth = 680 * sx;
      const nameSize = fitText(ctx, donorName, nameMaxWidth, 40 * sy, 22 * sy, 700, 'Prompt, sans-serif');
      ctx.font = `700 ${nameSize}px Prompt, sans-serif`;
      ctx.fillStyle = '#12102b';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillText(donorName, 250 * sx, 933 * sy);

      // ---- เลขที่กล่อง/ที่นั่ง ----
      const seatMaxWidth = 680 * sx;
      const seatSize = fitText(ctx, seatNo, seatMaxWidth, 64 * sy, 30 * sy, 700, 'Prompt, sans-serif');
      ctx.font = `700 ${seatSize}px Prompt, sans-serif`;
      ctx.fillStyle = '#170f6e';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillText(seatNo, 250 * sx, 1120 * sy);

      ticketDataUrl.value = canvas.toDataURL('image/png');

      await new Promise((resolve) => {
        canvas.toBlob((blob) => {
          ticketBlob.value = blob;
          resolve();
        }, 'image/png');
      });

      ticketRendering.value = false;
    }

    async function openTicket(row){
      currentRow.value = row;
      ticketOpen.value = true;
      try{
        await renderTicket(row);
      } catch(err){
        ticketRendering.value = false;
        alert('สร้างบัตรไม่สำเร็จ: ' + err.message);
      }
    }

    function closeTicket(){
      ticketOpen.value = false;
    }

    // เปิดรูปแบบเต็มในแท็บ/หน้าต่างใหม่ ให้ผู้ใช้กดค้าง (มือถือ) หรือคลิกขวา (คอม)
    // เพื่อ "บันทึกรูป" เอง วิธีนี้ใช้ได้แม้ในเว็บวิวของ LINE ที่บล็อกการดาวน์โหลดอัตโนมัติ
    function openImageForSaving(dataUrl){
      const win = window.open('', '_blank');
      if(!win){
        alert('เบราว์เซอร์บล็อกการเปิดหน้าต่างใหม่ กรุณาอนุญาต pop-up แล้วลองใหม่');
        return false;
      }
      win.document.write(`
        <!DOCTYPE html>
        <html><head><meta name="viewport" content="width=device-width, initial-scale=1">
        <title>บันทึกรูปบัตร</title>
        <style>
          body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;font-family:sans-serif;}
          p{color:#fff;padding:14px 18px;text-align:center;font-size:14px;margin:0;}
          img{width:100%;max-width:480px;display:block;}
        </style></head>
        <body>
          <p>📌 กดค้างที่รูป แล้วเลือก "บันทึกรูปภาพ" เพื่อเซฟลงเครื่อง</p>
          <img src="${dataUrl}" alt="บัตรตักบาตร">
        </body></html>
      `);
      win.document.close();
      return true;
    }

    function downloadTicket(){
      if(!ticketBlob.value){
        alert('ยังไม่มีรูปให้ดาวน์โหลด กรุณารอสักครู่');
        return;
      }

      const name = (currentRow.value && currentRow.value.donorName) ? currentRow.value.donorName.replace(/\s+/g,'_') : 'ticket';

      // ลองใช้วิธีดาวน์โหลดปกติก่อน (ใช้ได้ดีในเบราว์เซอร์ปกติ เช่น Safari/Chrome ทั่วไป)
      try{
        const blobUrl = URL.createObjectURL(ticketBlob.value);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = `ticket_${name}.png`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
      } catch(err){
        console.error(err);
      }

      // เผื่อกรณีเว็บวิวของ LINE บล็อกการดาวน์โหลดอัตโนมัติข้างต้น
      // เปิดรูปในแท็บใหม่ให้กดค้างบันทึกเองเป็นทางสำรองเสมอ
      openImageForSaving(ticketDataUrl.value);
    }

    async function loadData(userId){
      try{
        const res = await fetch(`${GAS_URL}?userId=${encodeURIComponent(userId)}&t=${Date.now()}`, {
  cache: 'no-store'
});

        if(!res.ok){
          throw new Error('HTTP ' + res.status);
        }

        const data = await res.json();

        if(data.error){
          errorMsg.value = data.error;
        } else {
          rows.value = data.rows || [];
        }

      } catch(err){
        errorMsg.value = 'ดึงข้อมูลไม่สำเร็จ: ' + err.message;
      } finally {
        loading.value = false;
      }
    }

    onMounted(async () => {
      try{
        await liff.init({ liffId: LIFF_ID });

        if(!liff.isLoggedIn()){
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
       greeting.value = 'หมายเลขกล่อง คุณ' + profile.displayName ;

        //greeting.value = '👋 สวัสดีค่ะ ' + profile.displayName + ' | userId: ' + profile.userId;

        // ส่ง userId ของคนที่กำลังเปิดอยู่ ไปกรองข้อมูลที่ GAS โดยตรง
        await loadData(profile.userId);

      } catch(err){
        loading.value = false;
        errorMsg.value = 'เกิดข้อผิดพลาด: ' + err.message;
      }
    });

    return {
      rows, greeting, loading, errorMsg, seatClass,
      ticketOpen, ticketRendering, ticketDataUrl, ticketCanvas,
      openTicket, closeTicket, downloadTicket
    };
  }
}).mount('#app');
</script>

</body>
</html>
